<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Games English - Mobile & AI Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- TEMA DEĞİŞKENLERİ --- */
        :root {
            --primary: #0d9488;          
            --bg-body: #f8fafc;          
            --bg-card: #ffffff;          
            --text-main: #0f172a;        
            --text-sub: #64748b;         
            --border: #e2e8f0;           
            --t1-color: #ef4444;         
            --t1-bg: #fff5f5;            
            --t2-color: #3b82f6;         
            --t2-bg: #f0f7ff;            
            --success: #22c55e;
            --splash-bg: #ffffff;
        }

        body.dark-mode {
            --primary: #14b8a6; --bg-body: #020617; --bg-card: #0f172a; --text-main: #f1f5f9;
            --text-sub: #94a3b8; --border: #1e293b; --t1-bg: rgba(239, 68, 68, 0.1);
            --t2-bg: rgba(59, 130, 246, 0.1); --splash-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--splash-bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease-out, visibility 0.8s; }
        .splash-logo { max-width: 400px; width: 80%; animation: pulseLogo 3s infinite ease-in-out; }
        #splash-screen.hidden-splash { opacity: 0; visibility: hidden; }
        @keyframes pulseLogo { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.9; } }

        /* HEADER */
        header { background: var(--bg-card); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-bottom: 1px solid var(--border); z-index: 50; }
        .logo { font-size: 26px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 12px; }
        .controls { display: flex; gap: 12px; align-items: center; }
        .control-btn { background: var(--bg-body); border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: var(--text-main); user-select: none; transition: 0.2s; }
        .control-btn:hover { border-color: var(--primary); transform: translateY(-2px); }

        /* CONTAINER & CARDS */
        .container { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 40px; margin: 40px auto; max-width: 1000px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid var(--border); text-align: center; }

        /* SEÇİM EKRANLARI (CİHAZ VE MOD) */
        .big-selection-grid { display: flex; gap: 30px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .big-btn { flex: 1; min-width: 250px; padding: 40px 20px; background: var(--bg-body); border: 2px solid var(--border); border-radius: 20px; font-size: 22px; font-weight: 800; color: var(--text-main); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 15px; transition: 0.3s; }
        .big-btn i { font-size: 48px; color: var(--primary); }
        .big-btn:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(13, 148, 136, 0.15); }

        /* TEAM SETUP */
        .team-setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .input-wrapper label { display: block; margin-bottom: 8px; font-weight: 800; }
        .input-wrapper input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg-body); color: var(--text-main); font-weight: 700; font-size: 16px; }

        /* SELECTION SCREEN (KURA) */
        #screenSelector { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 80px); width: 100%; background: var(--bg-body); }
        .selector-box { display: flex; gap: 50px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
        .player-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 30px; padding: 30px; width: 300px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.1); position: relative; }
        .number-display { font-size: 80px; font-weight: 900; line-height: 1; margin: 20px 0; }
        .card-t1 h3, .card-t1 .number-display { color: var(--t1-color); }
        .card-t2 h3, .card-t2 .number-display { color: var(--t2-color); }
        .btn-ready-big { padding: 20px 50px; font-size: 22px; font-weight: 800; background: var(--primary); color: white; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 10px 25px rgba(13, 148, 136, 0.3); transition: 0.2s; }
        .btn-ready-big:disabled { background: var(--text-sub); cursor: not-allowed; opacity: 0.7; }

        /* GAME SCREEN */
        #screenGame { display: flex; flex-direction: row; height: calc(100vh - 80px); width: 100vw; position: relative; }
        .team-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .team-1-zone { background: var(--t1-bg); border-right: 2px dashed var(--border); }
        .team-2-zone { background: var(--t2-bg); }
        .team-header { position: absolute; top: 30px; text-align: center; width: 100%; }
        .score-display { font-size: 60px; font-weight: 900; line-height: 1; }
        .active-player-badge { background: var(--text-main); color: var(--bg-body); padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 18px; display: inline-block; margin-top: 5px; }

        .central-word-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; background: #0f172a; color: white; padding: 25px 50px; border-radius: 20px; font-size: 42px; font-weight: 800; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-transform: uppercase; border: 4px solid var(--bg-card); text-align: center; transition: 0.3s; }

        /* ALTIN SORU */
        .golden-question .central-word-container { background: linear-gradient(135deg, #b45309 0%, #f59e0b 50%, #fbbf24 100%); border-color: #fcd34d; box-shadow: 0 0 50px rgba(245, 158, 11, 0.6); animation: goldPulse 1.5s infinite; }
        @keyframes goldPulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } 100% { transform: translate(-50%, -50%) scale(1); } }
        .golden-tag { display: none; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 800; white-space: nowrap; border: 2px solid white; }
        .golden-question .golden-tag { display: block; }

        .options-column { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; max-width: 350px; margin-top: 80px; }
        .opt-btn { padding: 20px; background: var(--bg-card); border: 3px solid var(--border); color: var(--text-main); border-radius: 16px; font-size: 20px; font-weight: 700; cursor: pointer; }
        .team-1-zone .opt-btn:hover:not(:disabled) { border-color: var(--t1-color); }
        .team-2-zone .opt-btn:hover:not(:disabled) { border-color: var(--t2-color); }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; transform: scale(1.05); }
        .opt-btn.wrong { background: var(--t1-color) !important; color: white !important; border-color: var(--t1-color) !important; animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; }
        .unit-btn { background: var(--bg-card); border: 2px solid var(--border); color: var(--text-main); padding: 25px; border-radius: 20px; cursor: pointer; font-weight: 700; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-main { padding: 18px 50px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 24px; color: var(--primary); margin-top: 30px; display: block; opacity: 0.8; }
        .hidden { display: none !important; }
        .confetti { position: absolute; width: 10px; height: 10px; top: -10px; border-radius: 50%; animation: fall 3s linear forwards; z-index: 100; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* --- MOBİL UYUMLULUK (RESPONSIVE) --- */
        @media (max-width: 768px) {
            header { padding: 10px 15px; flex-direction: column; gap: 10px; }
            .logo { font-size: 22px; }
            .card { margin: 20px auto; padding: 20px; width: 95%; }
            .big-selection-grid { flex-direction: column; }
            .team-setup-grid { grid-template-columns: 1fr; gap: 15px; }
            
            /* Mobil Oyun Ekranı Düzeni */
            #screenGame { flex-direction: column; height: auto; min-height: calc(100vh - 100px); overflow-y: auto; padding-top: 10px; }
            .central-word-container { position: relative; top: auto; left: auto; transform: none; width: 95%; margin: 15px auto; order: 2; padding: 15px; font-size: 28px; }
            
            /* Bot Üstte, Oyuncu Altta */
            .team-2-zone { order: 1; border-bottom: 2px dashed var(--border); padding: 10px; }
            .team-1-zone { order: 3; padding: 10px; border-right: none; }
            
            .team-header { position: relative; top: 0; margin-bottom: 10px; }
            .score-display { font-size: 40px; margin-bottom: 5px; }
            .options-column { margin-top: 10px; }
            .opt-btn { padding: 15px; font-size: 16px; }
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="lofi-bg.mp3" type="audio/mpeg"></audio>

<div id="splash-screen"><img src="image.png" alt="Me Games English" class="splash-logo"></div>

<header>
    <div class="logo"><i class="fas fa-graduation-cap"></i> Me Games English</div>
    <div class="controls">
        <div class="control-btn" onclick="toggleSound()" title="Sesi Aç/Kapat" id="btnSound"><i class="fas fa-volume-up"></i></div>
        <div class="control-btn" onclick="goHome()" title="Ana Menü"><i class="fas fa-home"></i></div>
        <div class="control-btn" onclick="toggleTheme()" id="btnTheme"><i class="fas fa-moon"></i> <span>Dark</span></div>
    </div>
</header>

<div class="container">
    
    <div id="screenDevice" class="card">
        <h1>Cihazını Seç</h1>
        <p style="color:var(--text-sub);">Hangi platformdan bağlanıyorsun?</p>
        <div class="big-selection-grid">
            <button class="big-btn" onclick="selectDevice('pc')">
                <i class="fas fa-desktop"></i> Akıllı Tahta / PC
            </button>
            <button class="big-btn" onclick="selectDevice('mobile')">
                <i class="fas fa-mobile-alt"></i> Mobil Aygıt
            </button>
        </div>
        <span class="signature">Designed by Muhammed Emir Turhan</span>
    </div>

    <div id="screenMode" class="card hidden">
        <h1>Oyun Modu</h1>
        <p style="color:var(--text-sub);">Nasıl oynamak istersin?</p>
        <div class="big-selection-grid">
            <button class="big-btn" onclick="selectMode('1p')">
                <i class="fas fa-robot"></i> Tek Kişilik<br><span style="font-size: 14px; font-weight: 600;">(Bot'a Karşı)</span>
            </button>
            <button class="big-btn" onclick="selectMode('2p')">
                <i class="fas fa-users"></i> İki Kişilik<br><span style="font-size: 14px; font-weight: 600;">(Sınıf Modu)</span>
            </button>
        </div>
    </div>

    <div id="screenTeams" class="card hidden">
        <h1 id="txtWelcome">Kurulum</h1>
        <p style="color:var(--text-sub); margin-bottom:30px" id="txtDesc">Bilgileri girin</p>
        <div class="team-setup-grid">
            <div style="text-align:left;" id="p1Setup">
                <div class="input-wrapper" style="margin-bottom:15px;">
                    <label style="color:var(--t1-color)" id="lblT1">1. Takım Adı</label>
                    <input type="text" id="t1Input" value="KARTALLAR">
                </div>
                <div class="input-wrapper" id="size1Wrapper">
                    <label><i class="fas fa-users"></i> Sınıf Mevcudu</label>
                    <input type="number" id="t1SizeInput" value="15" min="1">
                </div>
            </div>
            <div style="text-align:left;" id="p2Setup">
                <div class="input-wrapper" style="margin-bottom:15px;">
                    <label style="color:var(--t2-color)" id="lblT2">2. Takım Adı</label>
                    <input type="text" id="t2Input" value="ASLANLAR">
                </div>
                <div class="input-wrapper" id="size2Wrapper">
                    <label><i class="fas fa-users"></i> Sınıf Mevcudu</label>
                    <input type="number" id="t2SizeInput" value="15" min="1">
                </div>
            </div>
        </div>
        <button class="btn-main" onclick="goToUnits()">Devam Et</button>
    </div>

    <div id="screenUnits" class="card hidden"><h1 id="txtSelectUnit">Ünite Seçin</h1><div class="unit-grid" id="unitGrid"></div></div>

    <div id="screenSelector" class="hidden">
        <h1 style="margin-bottom: 40px;">Sıradaki Oyuncular</h1>
        <div class="selector-box">
            <div class="player-card card-t1"><h3 id="selT1Name">TAKIM 1</h3><div class="number-display" id="animNum1">?</div></div>
            <div class="player-card card-t2"><h3 id="selT2Name">TAKIM 2</h3><div class="number-display" id="animNum2">?</div></div>
        </div>
        <button class="btn-ready-big" id="btnReveal" onclick="startActualGame()" disabled><i class="fas fa-spinner fa-spin"></i> Kura Çekiliyor...</button>
    </div>

    <div id="screenGame" class="hidden">
        <div class="central-word-container" id="wordDisplay"><div class="golden-tag">✨ ALTIN SORU ✨</div><span id="wordText">WORD</span></div>
        <div class="team-zone team-1-zone"><div class="team-header"><div class="team-name-tag" id="dispT1Name">TAKIM 1</div><div class="score-display" id="score1">0</div><div class="active-player-badge" id="badge1" style="display:none;">Oyuncu #?</div></div><div class="options-column" id="opts1"></div></div>
        <div class="team-zone team-2-zone"><div class="team-header"><div class="team-name-tag" id="dispT2Name">TAKIM 2</div><div class="score-display" id="score2">0</div><div class="active-player-badge" id="badge2" style="display:none;">Oyuncu #?</div></div><div class="options-column" id="opts2"></div></div>
    </div>

    <div id="screenResult" class="card hidden">
        <h1>OYUN BİTTİ</h1><h2 id="winnerName" style="font-size: 56px; margin: 30px 0; color: var(--primary);"></h2>
        <button class="btn-main" onclick="goHome()">YENİDEN BAŞLAT</button>
    </div>
</div>

<script>
    // SES MOTORU
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    let isSoundOn = true;

    function playTone(freq, type, duration, vol) {
        if (!isSoundOn) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const soundFX = {
        click: () => playTone(400, 'sine', 0.1, 0.1),
        correct: () => { playTone(523.25, 'sine', 0.2, 0.2); setTimeout(() => playTone(659.25, 'sine', 0.3, 0.2), 100); },
        wrong: () => playTone(150, 'square', 0.3, 0.1),
        golden: () => { playTone(440, 'sine', 0.5, 0.1); setTimeout(() => playTone(554, 'sine', 0.5, 0.1), 100); setTimeout(() => playTone(659, 'sine', 0.8, 0.1), 200); },
        roll: () => playTone(800, 'triangle', 0.05, 0.05)
    };

    function toggleSound() {
        isSoundOn = !isSoundOn;
        document.querySelector('#btnSound i').className = isSoundOn ? "fas fa-volume-up" : "fas fa-volume-mute";
    }

    // KELİME HAVUZU
    const units = [
        { id: 1, name: "Friendship", icon: "fa-handshake", words: [{e:"Back up", t:"Desteklemek"}, {e:"Count on", t:"Güvenmek"}, {e:"Get on well", t:"İyi geçinmek"}, {e:"Laid-back", t:"Rahat"}, {e:"Stubborn", t:"İnatçı"}] },
        { id: 2, name: "Teen Life", icon: "fa-headphones", words: [{e:"Unbearable", t:"Dayanılmaz"}, {e:"Terrific", t:"Müthiş"}, {e:"Casual", t:"Günlük"}, {e:"Trendy", t:"Modaya uygun"}, {e:"Campfire", t:"Kamp ateşi"}] },
        { id: 3, name: "In The Kitchen", icon: "fa-utensils", words: [{e:"Bake", t:"Fırında pişirmek"}, {e:"Chop", t:"Doğramak"}, {e:"Ingredient", t:"Malzeme"}, {e:"Recipe", t:"Tarif"}, {e:"Whisk", t:"Çırpmak"}] },
        { id: 4, name: "On The Phone", icon: "fa-phone", words: [{e:"Hang up", t:"Kapatmak"}, {e:"Pick up", t:"Açmak"}, {e:"Engaged", t:"Meşgul"}, {e:"Dial", t:"Tuşlamak"}, {e:"Extension", t:"Dahili hat"}] },
        { id: 5, name: "The Internet", icon: "fa-wifi", words: [{e:"Connection", t:"Bağlantı"}, {e:"Notification", t:"Bildirim"}, {e:"Attachment", t:"Dosya eki"}, {e:"Confirm", t:"Onaylamak"}, {e:"Account", t:"Hesap"}] },
        { id: 6, name: "Adventures", icon: "fa-mountain", words: [{e:"Fascinating", t:"Büyüleyici"}, {e:"Helmet", t:"Kask"}, {e:"Ambitious", t:"Hırslı"}, {e:"Challenging", t:"Zorlayıcı"}, {e:"Entertaining", t:"Eğlenceli"}] },
        { id: 7, name: "Tourism", icon: "fa-plane", words: [{e:"Architecture", t:"Mimari"}, {e:"All-inclusive", t:"Her şey dahil"}, {e:"Ancient", t:"Antik"}, {e:"Destination", t:"Varış yeri"}, {e:"Accommodation", t:"Konaklama"}] },
        { id: 8, name: "Chores", icon: "fa-broom", words: [{e:"Do the laundry", t:"Çamaşır yıkamak"}, {e:"Mopping", t:"Paspas yapmak"}, {e:"Ironing", t:"Ütü yapmak"}, {e:"Responsibility", t:"Sorumluluk"}, {e:"Take out trash", t:"Çöpü çıkarmak"}] },
        { id: 9, name: "Science", icon: "fa-flask", words: [{e:"Test tube", t:"Deney tüpü"}, {e:"Vaccination", t:"Aşılama"}, {e:"Explosion", t:"Patlama"}, {e:"High-tech", t:"Yüksek teknoloji"}, {e:"Process", t:"Süreç"}] },
        { id: 10, name: "Natural Forces", icon: "fa-bolt", words: [{e:"Avalanche", t:"Çığ"}, {e:"Hurricane", t:"Kasırga"}, {e:"Shortage", t:"Kıtlık"}, {e:"Global warming", t:"Küresel ısınma"}, {e:"Take precaution", t:"Önlem almak"}] }
    ];

    let gameMode = '2p'; // '1p' veya '2p'
    let deviceType = 'pc';
    let selectedUnit = null, scores = [0, 0], wordPool = [], currentWord = null;
    let isRoundActive = false, isGoldenQuestion = false;
    let t1Size = 15, t2Size = 15, t1Pool = [], t2Pool = [];
    let currentP1 = 0, currentP2 = 0;
    let aiTimer = null; // Bot'un düşünme süresi

    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden-splash'); }, 2000);
        document.body.addEventListener('click', (e) => { if(e.target.tagName === 'BUTTON' || e.target.closest('.control-btn')) soundFX.click(); });
    });

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    
    function goHome() {
        document.querySelectorAll('.card, #screenSelector, #screenGame').forEach(el => el.classList.add('hidden'));
        document.getElementById('screenDevice').classList.remove('hidden');
        scores = [0, 0]; updateScores(); clearTimeout(aiTimer);
    }

    // YENİ: CİHAZ VE MOD SEÇİMİ
    function selectDevice(dev) {
        deviceType = dev;
        document.getElementById('screenDevice').classList.add('hidden');
        if (dev === 'mobile') {
            selectMode('1p'); // Mobilde direkt tek kişilik aç
        } else {
            document.getElementById('screenMode').classList.remove('hidden');
        }
    }

    function selectMode(mode) {
        gameMode = mode;
        document.getElementById('screenMode').classList.add('hidden');
        
        // Formu moda göre ayarla
        if (gameMode === '1p') {
            document.getElementById('txtDesc').textContent = "Bot'a karşı oynamak için ismini gir";
            document.getElementById('lblT1').textContent = "Senin Adın";
            document.getElementById('t1Input').value = "OYUNCU";
            document.getElementById('size1Wrapper').style.display = 'none';
            document.getElementById('p2Setup').style.display = 'none'; // Takım 2 gizle
            document.getElementById('badge1').style.display = 'none';
            document.getElementById('badge2').style.display = 'none';
        } else {
            document.getElementById('txtDesc').textContent = "Sınıf mevcutlarını girin";
            document.getElementById('lblT1').textContent = "1. Takım Adı";
            document.getElementById('t1Input').value = "KARTALLAR";
            document.getElementById('size1Wrapper').style.display = 'block';
            document.getElementById('p2Setup').style.display = 'block'; // Takım 2 göster
            document.getElementById('badge1').style.display = 'inline-block';
            document.getElementById('badge2').style.display = 'inline-block';
        }
        
        document.getElementById('screenTeams').classList.remove('hidden');
    }

    function fillPool(size) { return Array.from({length: size}, (_, i) => i + 1); }

    function getNextPlayer(team) {
        let pool = team === 1 ? t1Pool : t2Pool;
        let size = team === 1 ? t1Size : t2Size;
        if (pool.length === 0) { pool = fillPool(size); if (team === 1) t1Pool = pool; else t2Pool = pool; }
        const randIndex = Math.floor(Math.random() * pool.length);
        const playerNum = pool[randIndex];
        pool.splice(randIndex, 1);
        return playerNum;
    }

    function goToUnits() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        if (gameMode === '2p') {
            t1Size = parseInt(document.getElementById('t1SizeInput').value) || 15;
            t2Size = parseInt(document.getElementById('t2SizeInput').value) || 15;
            t1Pool = fillPool(t1Size); t2Pool = fillPool(t2Size);
        }

        document.getElementById('screenTeams').classList.add('hidden');
        document.getElementById('screenUnits').classList.remove('hidden');
        const grid = document.getElementById('unitGrid');
        grid.innerHTML = '';
        units.forEach(u => {
            const btn = document.createElement('button');
            btn.className = 'unit-btn';
            btn.innerHTML = `<i class="fas ${u.icon}"></i><span>${u.name}</span>`;
            btn.onclick = () => startCompetition(u);
            grid.appendChild(btn);
        });
    }

    function startCompetition(unit) {
        selectedUnit = unit;
        wordPool = [...unit.words].sort(() => Math.random() - 0.5);
        document.getElementById('screenUnits').classList.add('hidden');
        
        document.getElementById('dispT1Name').textContent = document.getElementById('t1Input').value;
        if (gameMode === '1p') {
            document.getElementById('dispT2Name').textContent = "🤖 MeBot";
            // 1P modunda kura yok, direkt oyuna geç
            startActualGame();
        } else {
            document.getElementById('dispT2Name').textContent = document.getElementById('t2Input').value;
            document.getElementById('selT1Name').textContent = document.getElementById('t1Input').value;
            document.getElementById('selT2Name').textContent = document.getElementById('t2Input').value;
            goToSelector();
        }
    }

    function goToSelector() {
        if (wordPool.length === 0) { endGame(); return; }
        document.getElementById('screenGame').classList.add('hidden');
        document.getElementById('screenSelector').classList.remove('hidden');
        const btn = document.getElementById('btnReveal');
        btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Kura Çekiliyor...`; btn.style.background = "#94a3b8";
        
        let counter = 0;
        const interval = setInterval(() => {
            soundFX.roll();
            document.getElementById('animNum1').textContent = Math.floor(Math.random() * t1Size) + 1;
            document.getElementById('animNum2').textContent = Math.floor(Math.random() * t2Size) + 1;
            counter++;
            if(counter > 20) { clearInterval(interval); finalizeSelection(); }
        }, 100);
    }

    function finalizeSelection() {
        currentP1 = getNextPlayer(1); currentP2 = getNextPlayer(2);
        document.getElementById('animNum1').textContent = currentP1;
        document.getElementById('animNum2').textContent = currentP2;
        const btn = document.getElementById('btnReveal');
        btn.disabled = false; btn.innerHTML = `<i class="fas fa-play"></i> SORUYU GÖSTER`; btn.style.background = "var(--primary)";
    }

    function startActualGame() {
        if (wordPool.length === 0) { endGame(); return; }
        
        document.getElementById('screenSelector').classList.add('hidden');
        document.getElementById('screenGame').classList.remove('hidden');
        
        if (gameMode === '2p') {
            document.getElementById('badge1').textContent = `Oyuncu #${currentP1}`;
            document.getElementById('badge2').textContent = `Oyuncu #${currentP2}`;
        }
        
        isRoundActive = true;
        currentWord = wordPool.pop();
        
        isGoldenQuestion = Math.random() < 0.15;
        const gameContainer = document.getElementById('screenGame');
        if(isGoldenQuestion) { gameContainer.classList.add('golden-question'); soundFX.golden(); } 
        else { gameContainer.classList.remove('golden-question'); }

        document.getElementById('wordText').textContent = currentWord.e;
        
        let opts = [currentWord.t];
        let others = selectedUnit.words.filter(w => w.t !== currentWord.t).sort(() => Math.random() - 0.5);
        others.forEach(o => { if(opts.length < 4) opts.push(o.t); });
        while(opts.length < 4) { opts.push("..."); }
        opts.sort(() => Math.random() - 0.5);
        renderOptions(opts);

        // YENİ: MEBOT (YAPAY ZEKA) MANTIĞI
        if (gameMode === '1p') {
            // Bot 1.5 sn ile 3.5 sn arasında bir tepki süresi verir
            let botThinkTime = Math.random() * 2000 + 1500;
            aiTimer = setTimeout(() => {
                if (!isRoundActive) return; // Oyuncu daha önce bastıysa bot durur
                
                // Bot %75 ihtimalle doğru bilir
                let botWillBeCorrect = Math.random() < 0.75;
                let selectedVal = botWillBeCorrect ? currentWord.t : opts.find(o => o !== currentWord.t);
                
                // Botun butonunu bul (Takım 2 bölgesindeki butonlar)
                let botBtns = document.querySelectorAll('.team-2-zone .opt-btn');
                let targetBtn = Array.from(botBtns).find(b => b.textContent === selectedVal);
                
                if(targetBtn) check(2, targetBtn, selectedVal);

            }, botThinkTime);
        }
    }

    function renderOptions(opts) {
        const cont1 = document.getElementById('opts1');
        const cont2 = document.getElementById('opts2');
        cont1.innerHTML = ''; cont2.innerHTML = '';
        opts.forEach(o => {
            const b1 = document.createElement('button');
            b1.className = 'opt-btn'; b1.textContent = o;
            b1.onclick = () => check(1, b1, o);
            cont1.appendChild(b1);
            
            const b2 = document.createElement('button');
            b2.className = 'opt-btn'; b2.textContent = o;
            // 1P modunda oyuncu botun butonlarına basamasın
            if (gameMode === '1p') { b2.style.pointerEvents = 'none'; } 
            else { b2.onclick = () => check(2, b2, o); }
            cont2.appendChild(b2);
        });
    }

    function check(teamId, btn, val) {
        if (!isRoundActive) return;
        isRoundActive = false; 
        clearTimeout(aiTimer); // Biri basınca botun süresini durdur

        if (val === currentWord.t) {
            btn.classList.add('correct'); soundFX.correct();
            scores[teamId - 1] += isGoldenQuestion ? 30 : 10;
            updateScores();
            
            if (gameMode === '1p') setTimeout(startActualGame, 1500);
            else setTimeout(goToSelector, 1500);
        } else {
            btn.classList.add('wrong'); soundFX.wrong();
            scores[teamId - 1] -= 5;
            updateScores();
            
            wordPool.unshift(currentWord); // Cezalı kelimeyi geri at
            
            if (gameMode === '1p') setTimeout(startActualGame, 1500);
            else setTimeout(goToSelector, 1500);
        }
    }

    function updateScores() {
        document.getElementById('score1').textContent = scores[0];
        document.getElementById('score2').textContent = scores[1];
    }

    function endGame() {
        document.querySelectorAll('.hidden').forEach(el => el.classList.add('hidden'));
        document.getElementById('screenResult').classList.remove('hidden');
        const t1 = document.getElementById('t1Input').value;
        const t2 = gameMode === '1p' ? "🤖 MeBot" : document.getElementById('t2Input').value;
        let winnerText = "";
        if (scores[0] > scores[1]) winnerText = t1;
        else if (scores[1] > scores[0]) winnerText = t2;
        else winnerText = "BERABERE";
        document.getElementById('winnerName').textContent = winnerText !== "BERABERE" ? "KAZANAN: " + winnerText : "BERABERE";
        startConfetti();
    }

    function startConfetti() {
        soundFX.correct(); setTimeout(soundFX.correct, 200);
        const colors = ["#ef4444", "#3b82f6", "#0d9488", "#f59e0b"];
        for(let i=0; i<60; i++) {
            const c = document.createElement('div'); c.className = 'confetti';
            c.style.left = Math.random() * 100 + "vw"; c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.animationDelay = Math.random() * 2 + "s"; document.body.appendChild(c);
        }
    }
</script>
